# Example: Add fuzzd as a security gate in your MCP server's CI pipeline.
#
# This workflow scans your server's tool descriptions for Tool Poisoning Attack
# (TPA) patterns on every push and pull request. If critical or high-severity
# issues are found, the job fails and the PR is blocked.
#
# Prerequisites:
#   1. Add a step to your build that dumps your tool definitions to tools.json.
#      For a Node.js MCP server: `node server.js --dump-tools > tools.json`
#      For a Python MCP server: `python server.py --export-tools > tools.json`
#   2. tools.json must be MCP tools/list format: {"tools": [...]} or a bare array.

name: MCP Security Scan

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  fuzzd-scan:
    name: Tool Poisoning Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Install fuzzd ────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build fuzzd
        run: cargo build --release
        working-directory: path/to/fuzzd  # adjust to your setup

      # ── Export your server's tool definitions ────────────────────────────
      # Replace this step with however your server exposes its tool list.
      # The output must be JSON in MCP tools/list format.
      - name: Export tool definitions
        run: |
          # Example for a Node.js MCP server:
          # npm ci && node server.js --dump-tools > tools.json
          #
          # Or query a running server:
          # npx @modelcontextprotocol/inspector stdio node server.js --list-tools > tools.json
          #
          # For this demo, use the example clean server:
          cp demo/servers/clean.json tools.json

      # ── Run fuzzd scan ───────────────────────────────────────────────────
      # Exit code 0 = no critical/high findings → deploy is safe.
      # Exit code 1 = critical or high findings → block the PR.
      - name: Scan tool descriptions for TPA patterns
        run: ./target/release/fuzzd scan --schema tools.json
        working-directory: path/to/fuzzd

      # ── Optional: fail on ANY finding (including medium/low) ─────────────
      # Uncomment this step and remove the one above for stricter enforcement:
      #
      # - name: Strict TPA scan (fail on any finding)
      #   run: |
      #     ./target/release/fuzzd scan --schema tools.json
      #     if [ $? -ne 0 ]; then exit 1; fi
      #   working-directory: path/to/fuzzd

      # ── Optional: upload scan results as an artifact ─────────────────────
      # - name: Save scan results
      #   if: failure()
      #   run: ./target/release/fuzzd scan --schema tools.json > scan-results.txt 2>&1 || true
      #
